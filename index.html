<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple P2P Chat</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
/* Your exact CSS */
body{ margin:0; background:#111; display:flex; justify-content:center; font-family:Arial; height: 100vh; align-items: center; }
#phone{ width:360px; height:640px; background:#0b141a; display:flex; flex-direction:column; position: relative; }
header{ background:#075e54; color:white; padding:15px; font-size:18px; font-weight: bold; text-align: center; }
#chat{ flex:1; overflow-y:auto; padding:10px; display: none; } 
.msg{ max-width:70%; padding:8px 12px; margin:6px; border-radius:8px; word-wrap: break-word; }
.me{ background:#005c4b; color:white; margin-left:auto; }
.friend{ background:#202c33; color:white; }
#inputBar{ display:none; padding:8px; background:#202c33; } 
#msgInput{ flex:1; border:none; border-radius:20px; padding:10px; outline:none; background: #2a3942; color: white; }
button{ margin-left:6px; border:none; border-radius:20px; padding:10px 14px; background:#25d366; cursor:pointer; font-weight: bold; }

/* Setup Screen CSS */
#setupOverlay { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 12px; color: white; justify-content: center;}
.setup-box { background: #202c33; padding: 15px; border-radius: 10px; text-align: center; }
.setup-box input { width: 80%; padding: 10px; border-radius: 5px; border: none; text-align: center; font-size: 16px; font-weight: bold; margin: 10px 0; }
.setup-btn { background: #25d366; color: black; width: 100%; margin-top: 10px; margin-left: 0; }
</style>
</head>

<body>

<div id="phone">
    <header>Friend Chat</header>

    <div id="setupOverlay">
        <div class="setup-box">
            <strong>Your ID:</strong><br>
            <h2 id="myId" style="color: #25d366; letter-spacing: 2px;">Loading...</h2>
            <p style="font-size: 12px; color: gray;">Send this to your friend</p>
        </div>
        
        <div style="text-align: center; color: gray;">-- OR --</div>

        <div class="setup-box">
            <strong>Connect to Friend:</strong><br>
            <input type="text" id="friendId" placeholder="Enter friend's ID">
            <button class="setup-btn" onclick="connectToFriend()">Connect</button>
        </div>
    </div>

    <div id="chat"></div>

    <div id="inputBar">
        <input id="msgInput" placeholder="Type message">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
// Generate a random 4-digit ID for this user
const myRandomId = Math.floor(1000 + Math.random() * 9000).toString();
let peer = new Peer(myRandomId); 
let connection;

// Show the ID on the screen
peer.on('open', function(id) {
    document.getElementById('myId').innerText = id;
});

// Switch UI when connected
function startChatUI() {
    document.getElementById('setupOverlay').style.display = 'none';
    document.getElementById('chat').style.display = 'block';
    document.getElementById('inputBar').style.display = 'flex';
    addMsg("Connected successfully!", "friend");
}

// WHEN SOMEONE CONNECTS TO YOU
peer.on('connection', function(conn) {
    connection = conn;
    connection.on('open', startChatUI);
    connection.on('data', function(data) {
        addMsg(data, "friend");
    });
});

// WHEN YOU CONNECT TO SOMEONE ELSE
function connectToFriend() {
    const friendId = document.getElementById('friendId').value.trim();
    if (!friendId) return alert("Enter an ID");

    connection = peer.connect(friendId);
    connection.on('open', startChatUI);
    connection.on('data', function(data) {
        addMsg(data, "friend");
    });
}

// Send Message
function sendMsg() {
    let text = document.getElementById("msgInput").value;
    if(!text || !connection || !connection.open) return;

    connection.send(text);
    addMsg(text, "me");
    document.getElementById("msgInput").value = "";
}

// Add Message to Screen
function addMsg(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

// Press Enter to send
document.getElementById('msgInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') sendMsg();
});
</script>

</body>
</html>
